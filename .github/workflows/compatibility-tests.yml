name: Compatibility Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compatibility:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install podman-compose
        run: pip3 install podman-compose==1.2.0

      - name: Start test infrastructure
        run: |
          podman-compose up -d
          sleep 5
          podman ps --format '{{.Names}} {{.Status}}'
          RUNNING=$(podman ps --filter 'status=running' --format '{{.Names}}' | wc -l)
          if [ "$RUNNING" -lt 3 ]; then
            echo "::error::Expected 3 running containers, found $RUNNING"
            podman ps -a
            exit 1
          fi
        timeout-minutes: 10

      - name: Wait for registries
        run: ./wait-for-ready.sh 180
        timeout-minutes: 5

      - name: Run compatibility tests
        run: |
          CONFLUENT_VERSION=$(grep -oP 'cp-schema-registry:\K[0-9]+\.[0-9]+\.[0-9]+' podman-compose.yml)
          mvn clean test -B -Dconfluent.registry.version="$CONFLUENT_VERSION"
        timeout-minutes: 15

      - name: Collect container logs
        if: always()
        run: podman-compose logs || true

      - name: Upload compatibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-report
          path: target/compatibility-report.html
          retention-days: 30

      - name: Tear down infrastructure
        if: always()
        run: podman-compose down -v || true

  publish-report:
    needs: compatibility
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Download compatibility report
        uses: actions/download-artifact@v4
        with:
          name: compatibility-report
          path: report-output

      - name: Extract report summary
        id: summary
        run: |
          REPORT="report-output/compatibility-report.html"

          # Extract counts from summary cards
          TOTAL=$(grep -oP 'Total.*?<div class="number[^"]*">\K[0-9]+' "$REPORT" | head -1 || echo "?")
          PASS=$(grep -oP 'Pass.*?<div class="number pass[^"]*">\K[0-9]+' "$REPORT" | head -1 || echo "?")
          FAIL=$(grep -oP 'Fail.*?<div class="number fail[^"]*">\K[0-9]+' "$REPORT" | head -1 || echo "?")
          SKIP=$(grep -oP 'Skipped.*?<div class="number skipped[^"]*">\K[0-9]+' "$REPORT" | head -1 || echo "?")
          KNOWN=$(grep -oP 'Known Incompat\..*?<div class="number known[^"]*">\K[0-9]+' "$REPORT" | head -1 || echo "?")
          ERR=$(grep -oP 'Error.*?<div class="number error[^"]*">\K[0-9]+' "$REPORT" | head -1 || echo "?")
          VERSION=$(grep -oP 'Confluent Schema Registry: v\K[0-9.]+' "$REPORT" | head -1 || echo "unknown")

          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "pass=$PASS" >> "$GITHUB_OUTPUT"
          echo "fail=$FAIL" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "known=$KNOWN" >> "$GITHUB_OUTPUT"
          echo "error=$ERR" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$FAIL" = "0" ] && [ "$ERR" = "0" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Find or create report issue
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Look for the pinned report issue
          ISSUE_NUMBER=$(gh issue list --state open --search "Compatibility Test Report Dashboard" --json number --jq '.[0].number' || true)

          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_NUMBER=$(gh issue create \
              --title "Compatibility Test Report Dashboard" \
              --body "Latest compatibility test results are posted as comments below. The full HTML report is available as a [workflow artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
              --json number | jq -r '.number')
          fi

          echo "number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Post report summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="${{ steps.summary.outputs.status }}"
          VERSION="${{ steps.summary.outputs.version }}"
          TOTAL="${{ steps.summary.outputs.total }}"
          PASS="${{ steps.summary.outputs.pass }}"
          FAIL="${{ steps.summary.outputs.fail }}"
          SKIP="${{ steps.summary.outputs.skip }}"
          KNOWN="${{ steps.summary.outputs.known }}"
          ERR="${{ steps.summary.outputs.error }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          RUN_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          if [ "$STATUS" = "passed" ]; then
            ICON=":white_check_mark:"
          else
            ICON=":x:"
          fi

          gh issue comment "${{ steps.issue.outputs.number }}" --body "$(cat <<BODY
          ## $ICON Compatibility Report — $RUN_DATE

          **Commit:** [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          **Confluent SR:** v${VERSION}

          | | Count |
          |---|---|
          | Total | ${TOTAL} |
          | Pass | ${PASS} |
          | Fail | ${FAIL} |
          | Skipped (Known Gaps) | ${SKIP} |
          | Known Incompatibilities | ${KNOWN} |
          | Errors | ${ERR} |

          **Full HTML report:** [Download artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) (compatibility-report)

          ---
          BODY
          )"
